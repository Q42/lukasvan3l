<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boodschappen — prijsvergelijker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #1c1c1c;
    --mid: #555;
    --light: #f4f4f0;
    --white: #fff;
    --radius: 18px;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --varuvo: #d97706;
    --ah: #00a0e2;
    --vhtg: #2d7a3a;
    --geen: #999;
  }

  body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); min-height: 100vh; }
  [x-cloak] { display: none !important; }

  .wrap { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }

  header { margin-bottom: 20px; }
  header .eyebrow { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--mid); margin-bottom: 8px; }
  header .eyebrow a { color: inherit; text-decoration: none; }
  header h1 { font-family: 'Fraunces', serif; font-size: 40px; font-weight: 900; line-height: 1.05; letter-spacing: -1px; margin-bottom: 8px; }
  header p { font-size: 15px; color: var(--mid); max-width: 560px; line-height: 1.5; }

  /* ── account-balk ── */
  .accountbalk { display: flex; align-items: center; gap: 12px; margin: 18px 0 4px; font-size: 14px; color: var(--mid); }
  .accountbalk .naam { font-weight: 600; color: var(--dark); }
  .accountbalk .spacer { flex: 1; }
  .knop, button.knop { font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; background: var(--white); color: var(--dark); padding: 9px 16px; border-radius: 12px; text-decoration: none; display: inline-block; }
  .knop.donker { background: var(--dark); color: var(--white); border-color: var(--dark); }
  .knop.klein { padding: 6px 12px; font-size: 13px; }

  /* ── tabs ── */
  .tabs { display: flex; gap: 8px; margin: 20px 0; flex-wrap: wrap; }
  .tabs button { font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #ddd; background: var(--white); color: var(--mid); padding: 8px 16px; border-radius: 999px; transition: all .15s ease; }
  .tabs button.actief { background: var(--dark); border-color: var(--dark); color: var(--white); }
  .tabs button .bol { display: inline-block; min-width: 20px; padding: 1px 6px; margin-left: 6px; background: var(--light); border-radius: 999px; font-size: 12px; }
  .tabs button.actief .bol { background: rgba(255,255,255,.25); }

  .kaart { background: var(--white); border: 1px solid #eee; border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 22px; margin-bottom: 18px; }
  .kaart h2 { font-family: 'Fraunces', serif; font-size: 20px; margin-bottom: 12px; }

  /* ── invoer ── */
  .invoerrij { display: flex; gap: 10px; }
  .invoerrij input[type=text] { flex: 1; font: inherit; font-size: 16px; padding: 12px 14px; border: 1px solid #ddd; border-radius: 12px; background: var(--white); }
  .invoerrij input:focus { outline: 2px solid var(--dark); border-color: transparent; }
  .invoerrij button { font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--dark); color: var(--white); border: none; padding: 12px 20px; border-radius: 12px; }
  .suggesties { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .suggesties button { font: inherit; font-size: 13px; cursor: pointer; border: 1px dashed #ccc; background: transparent; color: var(--mid); padding: 4px 10px; border-radius: 999px; }
  .suggesties button:hover { border-color: var(--dark); color: var(--dark); }

  /* ── lijst items ── */
  ul.items { list-style: none; }
  ul.items li { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid #f0f0ec; }
  ul.items li:last-child { border-bottom: none; }
  ul.items li.af .naam { text-decoration: line-through; color: #aaa; }

  .vink { width: 24px; height: 24px; flex: none; cursor: pointer; appearance: none; border: 2px solid #ccc; border-radius: 8px; position: relative; }
  .vink:checked { background: var(--dark); border-color: var(--dark); }
  .vink:checked::after { content: "✓"; color: #fff; font-size: 15px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -52%); }

  .itemtekst { flex: 1; min-width: 0; }
  .itemtekst .naam { font-size: 16px; font-weight: 500; }
  .itemtekst .sub { font-size: 12px; color: var(--mid); margin-top: 2px; }

  .aantalknoppen { display: flex; align-items: center; gap: 4px; flex: none; }
  .aantalknoppen button { width: 28px; height: 28px; font-size: 16px; line-height: 1; cursor: pointer; border: 1px solid #ddd; background: var(--white); border-radius: 8px; color: var(--mid); }
  .aantalknoppen .aantal { min-width: 26px; text-align: center; font-weight: 600; font-size: 15px; }

  .weg { flex: none; width: 28px; height: 28px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: #bbb; border-radius: 8px; }
  .weg:hover { color: #d33; background: #fdf0f0; }

  .leeg { color: var(--mid); font-size: 14px; padding: 8px 0; }

  /* ── shop badges ── */
  .badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; color: #fff; }
  .badge.varuvo { background: var(--varuvo); }
  .badge.ah { background: var(--ah); }
  .badge.vhtg { background: var(--vhtg); }
  .badge.geen { background: var(--geen); }

  /* ── bestellen ── */
  .shopblok { margin-bottom: 18px; }
  .shopblok .kop { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .shopblok .kop .totaal { margin-left: auto; font-weight: 700; font-size: 15px; }
  .shopblok table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .shopblok td { padding: 7px 4px; border-bottom: 1px solid #f0f0ec; vertical-align: top; }
  .shopblok tr:last-child td { border-bottom: none; }
  .shopblok td.prijs { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .shopblok td.q { white-space: nowrap; color: var(--mid); }
  .shopblok a { color: inherit; }
  .besparing { background: #eef7ee; border: 1px solid #d5ead5; border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 18px; }
  .waarschuwing { background: #fdf6ec; border: 1px solid #f0e2c8; border-radius: 12px; padding: 12px 16px; font-size: 14px; margin-bottom: 18px; color: #7a5a1e; }
  .kies-shop { font: inherit; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; padding: 2px 4px; background: #fff; color: var(--mid); }

  /* ── producten (catalogus) ── */
  details.product { border-bottom: 1px solid #f0f0ec; padding: 4px 0; }
  details.product summary { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px 4px; list-style: none; font-size: 15px; font-weight: 500; }
  details.product summary::-webkit-details-marker { display: none; }
  details.product summary .prijsjes { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; font-size: 12px; color: var(--mid); }
  .mapping { padding: 6px 4px 16px 4px; display: grid; gap: 10px; }
  .mapping .shoprij { display: grid; grid-template-columns: 74px 1fr 90px 70px; gap: 8px; align-items: center; }
  .mapping .shoprij label { font-size: 12px; font-weight: 700; }
  .mapping input { font: inherit; font-size: 13px; padding: 7px 9px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
  .mapping .hint { font-size: 11px; color: #999; grid-column: 2 / -1; margin-top: -6px; }
  .mapping .acties { display: flex; gap: 8px; margin-top: 4px; }
  .mapping .acties button { font: inherit; font-size: 12px; cursor: pointer; padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; background: var(--white); }
  .mapping .acties button.gevaar { color: #d33; border-color: #eecccc; }

  /* ── login / status ── */
  .midden { text-align: center; padding: 40px 0; }
  .midden .groot { font-size: 60px; margin-bottom: 16px; }
  .setup { background: #fdf6ec; border: 1px solid #f0e2c8; border-radius: 12px; padding: 16px 18px; font-size: 14px; color: #7a5a1e; line-height: 1.6; }
  .setup code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 5px; }
  .datum-info { font-size: 13px; color: var(--mid); margin: 4px 0 10px; }

  footer { margin-top: 40px; font-size: 13px; color: #aaa; }
  footer a { color: var(--mid); }

  @media (max-width: 560px) {
    header h1 { font-size: 32px; }
    .mapping .shoprij { grid-template-columns: 64px 1fr; }
  }
</style>
</head>
<body>
<div class="wrap" x-data="app()" x-init="init()" x-cloak>
  <header>
    <div class="eyebrow"><a href="../">lukasvan3l</a> · boodschappen</div>
    <h1>Boodschappen&shy;lijst</h1>
    <p>Voeg toe wat je nodig hebt. Bij het bestellen wordt elk product toegewezen aan de goedkoopste winkel: <span class="badge varuvo">Varuvo</span> <span class="badge ah">AH</span> <span class="badge vhtg">Van&nbsp;Haver&nbsp;tot&nbsp;Gort</span></p>
  </header>

  <!-- setup nog niet gedaan -->
  <template x-if="setupNodig">
    <div class="kaart">
      <div class="setup">
        <strong>Nog even instellen.</strong> Vul in <code>config.js</code> je Supabase
        <code>supabaseUrl</code> en <code>supabaseAnonKey</code> in. Zie
        <code>supabase/README.md</code> voor de stappen (project aanmaken, schema draaien, Google-login).
      </div>
    </div>
  </template>

  <!-- niet ingelogd -->
  <template x-if="!setupNodig && !session">
    <div class="kaart midden">
      <div class="groot">🛒</div>
      <p style="margin-bottom:18px;color:var(--mid)">Log in om je boodschappenlijst op al je apparaten te zien.</p>
      <button class="knop donker" @click="login()">Inloggen met Google</button>
    </div>
  </template>

  <!-- ingelogd maar geen toegang -->
  <template x-if="!setupNodig && session && toegangGecheckt && !toegang">
    <div class="kaart midden">
      <div class="groot">🔒</div>
      <p style="margin-bottom:6px"><strong>Geen toegang</strong></p>
      <p style="margin-bottom:18px;color:var(--mid)">Dit account (<span x-text="session?.user?.email"></span>) staat niet op de gastenlijst.</p>
      <button class="knop klein" @click="logout()">Uitloggen</button>
    </div>
  </template>

  <!-- ingelogd + toegang: de app -->
  <template x-if="!setupNodig && session && toegang">
    <div>
      <div class="accountbalk">
        <span>Ingelogd als <span class="naam" x-text="naam"></span></span>
        <span class="spacer"></span>
        <button class="knop klein" @click="logout()">Uitloggen</button>
      </div>

      <nav class="tabs">
        <button :class="{actief: tab==='lijst'}" @click="tab='lijst'">Lijst <span class="bol" x-text="actieveItems.length"></span></button>
        <button :class="{actief: tab==='bestellen'}" @click="tab='bestellen'">Bestellen</button>
        <button :class="{actief: tab==='producten'}" @click="tab='producten'">Producten</button>
      </nav>

      <!-- ══ LIJST ══ -->
      <div x-show="tab==='lijst'">
        <div class="kaart">
          <form class="invoerrij" @submit.prevent="voegToe(nieuwItem); nieuwItem=''">
            <input type="text" x-model="nieuwItem" placeholder="bijv. havermout, kokosmelk, wc-papier…" autocomplete="off">
            <button type="submit">Toevoegen</button>
          </form>
          <div class="suggesties">
            <template x-for="p in suggesties" :key="p.id">
              <button type="button" @click="voegToe(p.naam)" x-text="'+ ' + p.naam"></button>
            </template>
          </div>
        </div>
        <div class="kaart">
          <ul class="items">
            <template x-for="rij in lijstGesorteerd" :key="rij.id">
              <li :class="{af: rij.afgevinkt}">
                <input type="checkbox" class="vink" :checked="rij.afgevinkt" @change="toggleAf(rij)">
                <div class="itemtekst">
                  <div class="naam" x-text="naamVan(rij.product_id)"></div>
                  <div class="sub">
                    <template x-if="goedkoopste(rij.product_id)">
                      <span>goedkoopst: <span class="badge" :class="goedkoopste(rij.product_id).shop" x-text="SHOPS[goedkoopste(rij.product_id).shop].naam"></span>
                        <span x-text="fmt(goedkoopste(rij.product_id).sp) + (heeftInhoud(rij.product_id, goedkoopste(rij.product_id).shop) ? '/stuk' : '')"></span></span>
                    </template>
                    <template x-if="!goedkoopste(rij.product_id)"><span class="badge geen">prijs onbekend</span></template>
                  </div>
                </div>
                <div class="aantalknoppen">
                  <button @click="setAantal(rij, rij.aantal-1)">−</button>
                  <span class="aantal" x-text="rij.aantal"></span>
                  <button @click="setAantal(rij, rij.aantal+1)">+</button>
                </div>
                <button class="weg" title="Verwijder van lijst" @click="verwijderItem(rij)">✕</button>
              </li>
            </template>
          </ul>
          <p class="leeg" x-show="lijst.length===0">Nog niks op de lijst. Typ hierboven wat je nodig hebt.</p>
        </div>
      </div>

      <!-- ══ BESTELLEN ══ -->
      <div x-show="tab==='bestellen'">
        <template x-if="actieveItems.length===0">
          <div class="kaart"><p class="leeg">Zet eerst wat op de lijst, dan verschijnt hier de bestellijst per winkel.</p></div>
        </template>
        <template x-if="actieveItems.length>0">
          <div>
            <div class="besparing" x-show="besparing > 0.005">
              Slim verdelen bespaart <strong x-text="fmt(besparing)"></strong> t.o.v. alles bij de goedkoopste enkele winkel halen.
              Totaal zo verdeeld: <strong x-text="fmt(totaalVerdeeld)"></strong>.
            </div>
            <div class="waarschuwing" x-show="verdeling.geen.length>0">
              Van <span x-text="verdeling.geen.length"></span> product(en) is nog geen prijs bekend — die staan onderaan.
              Draai de prijs-agent of vul prijzen handmatig in bij Producten.
            </div>

            <template x-for="shopKey in ['varuvo','ah','vhtg','geen']" :key="shopKey">
              <div class="kaart shopblok" x-show="verdeling[shopKey].length>0">
                <div class="kop">
                  <span class="badge" :class="shopKey" x-text="shopKey==='geen' ? 'Prijs onbekend' : SHOPS[shopKey].naam"></span>
                  <span style="font-size:13px;color:var(--mid)"><span x-text="verdeling[shopKey].length"></span> product(en)</span>
                  <span class="totaal" x-show="shopKey!=='geen'" x-text="fmt(subtotaal(shopKey))"></span>
                </div>
                <table>
                  <template x-for="x in verdeling[shopKey]" :key="x.rij.id">
                    <tr>
                      <td class="q" x-text="x.rij.aantal + '×'"></td>
                      <td>
                        <a :href="linkVoor(x.rij.product_id, shopKey)" target="_blank" rel="noopener" x-text="naamVan(x.rij.product_id)"></a>
                        <select class="kies-shop" x-show="shopKey!=='geen'" @change="kiesShop(x.rij, $event.target.value)">
                          <template x-for="s in shopsMetPrijs(x.rij.product_id)" :key="s">
                            <option :value="s" :selected="s===shopKey" x-text="SHOPS[s].naam + ' ' + fmt(stuksprijsVan(x.rij.product_id, s))"></option>
                          </template>
                        </select>
                      </td>
                      <td class="prijs" x-text="shopKey==='geen' ? '—' : fmt(x.sp * x.rij.aantal)"></td>
                    </tr>
                  </template>
                </table>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- ══ PRODUCTEN ══ -->
      <div x-show="tab==='producten'">
        <div class="kaart">
          <h2>Productcatalogus</h2>
          <p class="datum-info" x-show="laatstBijgewerkt" x-text="'Prijzen voor het laatst bijgewerkt: ' + laatstBijgewerkt"></p>
          <p class="leeg" style="margin-bottom:8px">Elk product met per winkel de koppeling (link) en laatst bekende prijs. Normaal vult de prijs-agent deze; je kunt ze hier ook handmatig aanpassen. Varuvo verkoopt per doos: vul <em>inhoud</em> (stuks per doos) in voor een eerlijke stuksprijs.</p>
          <template x-for="p in productenGesorteerd" :key="p.id">
            <details class="product">
              <summary>
                <span x-text="p.naam"></span>
                <span class="prijsjes">
                  <template x-for="s in ['varuvo','ah','vhtg']" :key="s">
                    <template x-if="stuksprijsVan(p.id, s)!==null"><span class="badge" :class="s" x-text="fmt(stuksprijsVan(p.id, s))"></span></template>
                  </template>
                  <template x-if="shopsMetPrijs(p.id).length===0"><span class="badge geen">geen prijzen</span></template>
                </span>
              </summary>
              <div class="mapping">
                <template x-for="s in ['varuvo','ah','vhtg']" :key="s">
                  <div class="shoprij">
                    <label><span class="badge" :class="s" x-text="s"></span></label>
                    <input type="url" :placeholder="'productlink bij ' + SHOPS[s].naam" :value="veld(p.id,s,'url')" @change="zetPrijsVeld(p.id, s, 'url', $event.target.value)">
                    <input type="number" step="0.01" min="0" placeholder="prijs €" :value="veld(p.id,s,'prijs')" @change="zetPrijsVeld(p.id, s, 'prijs', $event.target.value)">
                    <input type="number" step="1" min="1" placeholder="inhoud" title="stuks per verpakking/doos" :value="veld(p.id,s,'inhoud')" @change="zetPrijsVeld(p.id, s, 'inhoud', $event.target.value)">
                  </div>
                </template>
                <div class="hint">
                  zoek:
                  <template x-for="s in ['varuvo','ah','vhtg']" :key="s">
                    <span><a :href="SHOPS[s].zoek(p.naam)" target="_blank" rel="noopener" x-text="SHOPS[s].naam"></a> </span>
                  </template>
                </div>
                <div class="acties">
                  <button @click="hernoem(p)">Hernoem</button>
                  <button class="gevaar" @click="verwijderProduct(p)">Verwijder product</button>
                </div>
              </div>
            </details>
          </template>
          <p class="leeg" x-show="producten.length===0">Nog geen producten.</p>
        </div>
      </div>
    </div>
  </template>

  <footer>
    Onderdeel van <a href="../">Lukas' plekkie</a> · live sync via Supabase
  </footer>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const cfg = window.BOODSCHAPPEN_CONFIG || {};
const sb = (cfg.supabaseUrl && cfg.supabaseAnonKey) ? createClient(cfg.supabaseUrl, cfg.supabaseAnonKey) : null;

const SHOPS = {
  varuvo: { naam: "Varuvo", zoek: n => "https://www.varuvo.nl/catalogsearch/result/?q=" + encodeURIComponent(n) },
  ah:     { naam: "Albert Heijn", zoek: n => "https://www.ah.nl/zoeken?query=" + encodeURIComponent(n) },
  vhtg:   { naam: "Van Haver tot Gort", zoek: n => "https://www.vanhavertotgort.nl/?s=" + encodeURIComponent(n) + "&post_type=product" },
};
const SHOP_KEYS = ["varuvo", "ah", "vhtg"];

function slug(naam) {
  return "p_" + naam.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "");
}

document.addEventListener("alpine:init", () => {
  Alpine.data("app", () => ({
    SHOPS, setupNodig: !sb, session: null, toegang: false, toegangGecheckt: false,
    tab: "lijst", nieuwItem: "",
    products: [],   // {id, naam}
    prices: [],     // {product_id, shop, prijs, inhoud, url, omschrijving, external_id, updated_at}
    lijst: [],      // list_items van deze gebruiker

    async init() {
      if (!sb) return;
      const { data } = await sb.auth.getSession();
      await this.zetSessie(data.session);
      sb.auth.onAuthStateChange((_e, s) => this.zetSessie(s));
    },

    async zetSessie(session) {
      this.session = session;
      if (!session) { this.toegang = false; this.toegangGecheckt = false; return; }
      // toegang = staat er een members-rij voor mij? (RLS geeft alleen mijn eigen rij)
      const { data } = await sb.from("members").select("user_id").maybeSingle();
      this.toegang = !!data;
      this.toegangGecheckt = true;
      if (this.toegang) { await this.laadAlles(); this.abonneer(); }
    },

    get naam() { return this.session?.user?.user_metadata?.full_name || this.session?.user?.email || "?"; },

    async login() {
      const redirectTo = location.href.split("#")[0];
      await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo } });
    },
    async logout() { await sb.auth.signOut(); location.reload(); },

    async laadAlles() {
      const [pr, pc, li] = await Promise.all([
        sb.from("products").select("*"),
        sb.from("prices").select("*"),
        sb.from("list_items").select("*").order("created_at"),
      ]);
      this.products = pr.data || [];
      this.prices = pc.data || [];
      this.lijst = li.data || [];
    },

    abonneer() {
      sb.channel("boodschappen")
        .on("postgres_changes", { event: "*", schema: "public", table: "products" }, async () => { this.products = (await sb.from("products").select("*")).data || []; })
        .on("postgres_changes", { event: "*", schema: "public", table: "prices" }, async () => { this.prices = (await sb.from("prices").select("*")).data || []; })
        .on("postgres_changes", { event: "*", schema: "public", table: "list_items" }, async () => { this.lijst = (await sb.from("list_items").select("*").order("created_at")).data || []; })
        .subscribe();
    },

    /* ── afgeleide data ── */
    naamVan(id) { return this.products.find(p => p.id === id)?.naam || id; },
    prijsRij(id, shop) { return this.prices.find(r => r.product_id === id && r.shop === shop) || null; },
    heeftInhoud(id, shop) { const r = this.prijsRij(id, shop); return r && r.inhoud > 1; },
    stuksprijsVan(id, shop) {
      const r = this.prijsRij(id, shop);
      if (!r || r.prijs == null) return null;
      return Number(r.prijs) / (r.inhoud > 0 ? r.inhoud : 1);
    },
    shopsMetPrijs(id) { return SHOP_KEYS.filter(s => this.stuksprijsVan(id, s) !== null); },
    goedkoopste(id) {
      let beste = null;
      for (const s of SHOP_KEYS) {
        const sp = this.stuksprijsVan(id, s);
        if (sp !== null && (beste === null || sp < beste.sp)) beste = { shop: s, sp };
      }
      return beste;
    },
    veld(id, shop, k) { const r = this.prijsRij(id, shop); const v = r ? r[k] : ""; return v == null ? "" : v; },

    get actieveItems() { return this.lijst.filter(r => !r.afgevinkt); },
    get lijstGesorteerd() { return [...this.lijst].sort((a, b) => (a.afgevinkt - b.afgevinkt) || (a.created_at || "").localeCompare(b.created_at || "")); },
    get productenGesorteerd() { return [...this.products].sort((a, b) => a.naam.localeCompare(b.naam, "nl")); },
    get suggesties() {
      const op = new Set(this.lijst.map(r => r.product_id));
      return this.productenGesorteerd.filter(p => !op.has(p.id)).slice(0, 12);
    },
    get laatstBijgewerkt() {
      const t = this.prices.map(r => r.updated_at).filter(Boolean).sort().pop();
      return t ? new Date(t).toLocaleString("nl-NL") : "";
    },

    get verdeling() {
      const per = { varuvo: [], ah: [], vhtg: [], geen: [] };
      for (const rij of this.actieveItems) {
        const beste = this.goedkoopste(rij.product_id);
        const keuze = (rij.shop_keuze && this.stuksprijsVan(rij.product_id, rij.shop_keuze) !== null) ? rij.shop_keuze : (beste ? beste.shop : null);
        if (!keuze) { per.geen.push({ rij }); continue; }
        per[keuze].push({ rij, sp: this.stuksprijsVan(rij.product_id, keuze) });
      }
      return per;
    },
    subtotaal(shop) { return this.verdeling[shop].reduce((t, x) => t + x.sp * x.rij.aantal, 0); },
    get totaalVerdeeld() { return SHOP_KEYS.reduce((t, s) => t + this.subtotaal(s), 0); },
    get besparing() {
      // vergelijk met alles-bij-één-winkel (alleen winkels waar élk product een prijs heeft)
      let goedkoopsteEnkel = Infinity;
      for (const s of SHOP_KEYS) {
        let som = 0, compleet = true;
        for (const rij of this.actieveItems) {
          const sp = this.stuksprijsVan(rij.product_id, s);
          if (sp === null) { compleet = false; break; }
          som += sp * rij.aantal;
        }
        if (compleet) goedkoopsteEnkel = Math.min(goedkoopsteEnkel, som);
      }
      if (!isFinite(goedkoopsteEnkel) || this.totaalVerdeeld === 0) return 0;
      return goedkoopsteEnkel - this.totaalVerdeeld;
    },
    linkVoor(id, shop) {
      if (shop === "geen") return SHOPS.ah.zoek(this.naamVan(id));
      return this.prijsRij(id, shop)?.url || SHOPS[shop].zoek(this.naamVan(id));
    },

    fmt(n) { return n == null ? "" : "€ " + Number(n).toFixed(2).replace(".", ","); },

    /* ── acties (schrijven naar Supabase) ── */
    async voegToe(naam) {
      naam = (naam || "").trim();
      if (!naam) return;
      const id = slug(naam);
      await sb.from("products").upsert({ id, naam }, { onConflict: "id" });
      const bestaand = this.lijst.find(r => r.product_id === id);
      if (bestaand) await sb.from("list_items").update({ aantal: bestaand.aantal + 1, afgevinkt: false }).eq("id", bestaand.id);
      else await sb.from("list_items").insert({ product_id: id, aantal: 1, user_id: this.session.user.id });
      await this.laadAlles();
    },
    async setAantal(rij, n) {
      n = Math.max(1, n);
      await sb.from("list_items").update({ aantal: n }).eq("id", rij.id);
      await this.laadAlles();
    },
    async toggleAf(rij) {
      await sb.from("list_items").update({ afgevinkt: !rij.afgevinkt }).eq("id", rij.id);
      await this.laadAlles();
    },
    async verwijderItem(rij) {
      await sb.from("list_items").delete().eq("id", rij.id);
      await this.laadAlles();
    },
    async kiesShop(rij, shop) {
      await sb.from("list_items").update({ shop_keuze: shop }).eq("id", rij.id);
      await this.laadAlles();
    },
    async zetPrijsVeld(id, shop, k, waarde) {
      const patch = { product_id: id, shop };
      patch[k] = k === "url" ? (waarde.trim() || null) : (waarde === "" ? null : Number(waarde));
      patch.updated_at = new Date().toISOString();
      await sb.from("prices").upsert(patch, { onConflict: "product_id,shop" });
      await this.laadAlles();
    },
    async hernoem(p) {
      const nieuw = prompt("Nieuwe naam:", p.naam);
      if (nieuw && nieuw.trim()) { await sb.from("products").update({ naam: nieuw.trim() }).eq("id", p.id); await this.laadAlles(); }
    },
    async verwijderProduct(p) {
      if (!confirm(`"${p.naam}" en alle koppelingen verwijderen?`)) return;
      await sb.from("products").delete().eq("id", p.id);  // cascade ruimt prices + list_items op
      await this.laadAlles();
    },
  }));
});
</script>
<script src="config.js"></script>
