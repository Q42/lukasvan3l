<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parro-overzicht</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* accent (user-default teal) + compacte dichtheid, uit de design-handoff */
    --brand: #2E6E7D;
    --brand-donker: #245864;
    --gap: 14px;          /* ritme tussen daggroepen (compact) */
    --card-pad: 15px;     /* padding in event-rij (compact) */

    /* oppervlakken */
    --page: #F6F3EC;
    --surface: #FFFFFF;
    --surface-mut: #FBFAF5;

    /* inkt */
    --ink: #1E2A22;
    --ink2: #5C6A60;
    --faint: #9AA69C;
    --faint2: #8A968D;
    --faint3: #B0B7AC;

    /* brand-tint + amber (actie = ik moet iets regelen) */
    --tint: #E7F0E7;
    --tint2: #EAF1EA;
    --tint-rand: #C9DCC9;
    --amber-spine: #C6741F;
    --amber-bg: #FBEEDB;
    --amber-label: #8A5216;
    --amber-deadline: #B9791F;
    --amber-rand: #EAD6B4;

    /* lijnen + neutrale chip */
    --rand-kaart: #EAE5D8;
    --rand-control: #E2DDD0;
    --rand-mut: #EEE9DC;
    --hair: #F0ECE1;
    --chip-bg: #F1EEE4;
    --chip-ink: #3A463D;

    --shadow: 0 1px 2px rgba(30,42,34,0.05);
  }

  body { font-family: 'Figtree', system-ui, -apple-system, sans-serif; background: var(--page); color: var(--ink); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  [x-cloak] { display: none !important; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 44px 20px 90px; }

  h1, h2, h3 { font-family: 'Bricolage Grotesque', 'Figtree', sans-serif; }

  /* ── header ── */
  header .eyebrow { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: var(--faint); }
  header .eyebrow a { color: inherit; text-decoration: none; }
  header .eyebrow a:hover { text-decoration: underline; }
  header h1 { margin-top: 6px; font-weight: 800; font-size: 44px; line-height: 1.02; letter-spacing: -0.01em; color: var(--ink); }
  header p.intro { margin-top: 12px; max-width: 52ch; font-size: 16px; line-height: 1.5; color: var(--ink2); }

  .accountbalk { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-top: 20px; font-size: 15px; color: var(--ink2); }
  .accountbalk .naam { font-weight: 600; color: var(--ink); }

  /* ── knoppen ── */
  .knop-pill { font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; padding: 9px 16px; border-radius: 999px; border: 1px solid var(--rand-control); background: var(--surface); color: var(--chip-ink); text-decoration: none; display: inline-block; transition: border-color .15s ease; }
  .knop-pill:hover { border-color: #C9C2B0; }
  .knop-brand { background: var(--brand); border-color: var(--brand); color: #fff; }
  .knop-brand:hover { background: var(--brand-donker); border-color: var(--brand-donker); }

  /* ── tabs ── */
  .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 24px 0 4px; }
  .tabs button { display: inline-flex; align-items: center; gap: 8px; font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; padding: 9px 16px; border-radius: 999px; border: 1px solid var(--rand-control); background: var(--surface); color: var(--ink2); transition: all .15s ease; }
  .tabs button.actief { background: var(--brand); border-color: var(--brand); color: #fff; }
  .tabs .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 22px; padding: 0 6px; border-radius: 999px; background: var(--tint); color: #2F6E43; font-size: 13px; font-weight: 700; }
  .tabs button.actief .badge { background: rgba(255,255,255,0.24); color: #fff; }

  /* ── paneel-koppen ── */
  .paneel { margin-top: 26px; }
  .paneel-kop-rij { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .paneel-kop { font-weight: 700; font-size: 22px; color: var(--ink); }
  .paneel-sub { margin-top: 6px; font-size: 15px; line-height: 1.5; color: var(--ink2); max-width: 56ch; }
  .te-regelen { display: inline-flex; align-items: center; gap: 8px; background: var(--amber-bg); color: var(--amber-label); font-size: 13px; font-weight: 700; padding: 4px 11px; border-radius: 999px; white-space: nowrap; }
  .te-regelen .swatch { width: 8px; height: 8px; border-radius: 2px; background: var(--amber-spine); }

  /* ── kind van de week ── */
  .kvdw { display: flex; align-items: center; gap: 12px; background: var(--tint); border: 1px solid var(--tint-rand); border-radius: 16px; padding: 14px 16px; margin-top: 18px; font-size: 15px; color: var(--ink); }
  .kvdw .ster { font-size: 24px; line-height: 1; }
  .kvdw strong { font-weight: 700; }

  /* ── agenda: daggroepen + event-kaart ── */
  .dag { margin-top: 22px; }
  .dag:first-of-type { margin-top: 22px; }
  .dag-kop { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; color: var(--brand); font-weight: 700; font-size: 13px; letter-spacing: 0.11em; text-transform: uppercase; }
  .dag-kop .vandaag { padding: 4px 11px; border-radius: 999px; background: var(--brand); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 0.09em; }

  .event-kaart { background: var(--surface); border: 1px solid var(--rand-kaart); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; margin-bottom: var(--gap); }
  .event-rij { display: flex; gap: 14px; padding: var(--card-pad); }
  .spine { width: 4px; border-radius: 4px; flex: none; }
  .event-inhoud { flex: 1; min-width: 0; }
  .event-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .event-top h3 { font-weight: 700; font-size: 18px; color: var(--ink); }
  .event-top .spacer { flex: 1; }
  .event-oms { margin-top: 6px; color: var(--ink2); font-size: 15px; line-height: 1.5; }

  .kind-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .kind-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; background: var(--chip-bg); color: var(--chip-ink); font-size: 13px; font-weight: 600; }
  .kind-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }

  /* actie-strips (afvinkbaar) */
  .acties { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .actie { display: flex; align-items: center; gap: 10px; background: var(--amber-bg); border-radius: 10px; padding: 10px 12px; cursor: pointer; }
  .actie .vink { width: 20px; height: 20px; flex: none; cursor: pointer; appearance: none; border: 2px solid var(--amber-deadline); border-radius: 6px; background: transparent; position: relative; }
  .actie .vink:checked { background: var(--amber-deadline); border-color: var(--amber-deadline); }
  .actie .vink:checked::after { content: "✓"; color: #fff; font-size: 13px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -52%); }
  .actie .label { flex: 1; min-width: 0; font-weight: 700; font-size: 14px; color: var(--amber-label); }
  .actie .deadline { font-size: 13px; font-weight: 700; color: var(--amber-deadline); white-space: nowrap; }
  .actie.af { background: var(--chip-bg); }
  .actie.af .label { color: var(--faint); text-decoration: line-through; }
  .actie.af .deadline { color: var(--faint); }
  .actie.af .vink { border-color: var(--faint); }
  .actie.af .vink:checked { background: var(--faint); border-color: var(--faint); }

  /* ── weekoverzicht (markdown-samenvattingen) ── */
  .week { margin-top: 20px; }
  .week-kop { color: var(--brand); font-weight: 700; font-size: 13px; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 10px; }
  .week-kaart { background: var(--surface); border: 1px solid var(--rand-kaart); border-radius: 16px; box-shadow: var(--shadow); padding: 16px 18px; }
  .md { font-size: 15px; line-height: 1.6; color: var(--ink2); }
  .md h1, .md h2, .md h3 { margin: 14px 0 6px; font-size: 16px; font-weight: 700; color: var(--ink); }
  .md h1:first-child, .md h2:first-child, .md h3:first-child { margin-top: 0; }
  .md p { margin: 8px 0; }
  .md ul { margin: 8px 0 8px 20px; }
  .md li { margin: 3px 0; }
  .md strong { font-weight: 700; color: var(--ink); }

  /* ── meldingen ── */
  .meldingen { margin-top: 18px; display: flex; flex-direction: column; gap: 10px; }
  .melding { display: flex; gap: 12px; border-radius: 14px; padding: 16px; background: var(--surface); border: 1px solid var(--rand-kaart); }
  .melding .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--brand); flex: none; margin-top: 6px; }
  .melding.gelezen { background: var(--surface-mut); border-color: var(--rand-mut); }
  .melding.gelezen .dot { background: #D8D3C6; }
  .melding-inhoud { flex: 1; min-width: 0; }
  .melding-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .melding-top .spacer { flex: 1; }
  .afzender-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .afzender-pill.algemeen { background: var(--tint2); color: var(--brand); }
  .afzender-pill.groep { background: var(--chip-bg); color: var(--chip-ink); }
  .melding .tijd { font-size: 12px; color: var(--faint); white-space: nowrap; }
  .melding h3 { margin: 8px 0 3px; font-weight: 700; font-size: 16px; color: var(--ink); }
  .melding .tekst { color: var(--ink2); font-size: 14px; line-height: 1.5; white-space: pre-line; }
  .melding .tekst.dicht { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; cursor: pointer; }
  .melding.gelezen h3 { color: var(--chip-ink); }
  .melding.gelezen .tekst { color: var(--faint2); }
  .melding.gelezen .tijd { color: var(--faint3); }

  /* ── foto's ── */
  .foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .foto-tegel { position: relative; aspect-ratio: 1; border: 1px solid var(--rand-kaart); padding: 0; margin: 0; background: var(--surface-mut); border-radius: 12px; overflow: hidden; cursor: pointer; }
  .foto-tegel img, .foto-tegel video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .foto-tegel .speel { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 34px; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.6); pointer-events: none; }

  .lightbox { position: fixed; inset: 0; background: rgba(30,42,34,.85); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 50; }
  .lightbox .doos { max-width: 92vw; max-height: 92vh; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .lightbox img, .lightbox video { max-width: 92vw; max-height: 78vh; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.5); }
  .lightbox .balk { display: flex; gap: 10px; align-items: center; }
  .lightbox .nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; border-radius: 50%; border: none; background: rgba(255,255,255,.15); color: #fff; font-size: 32px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background .15s; }
  .lightbox .nav:hover { background: rgba(255,255,255,.3); }
  .lightbox .nav.vorige { left: 16px; }
  .lightbox .nav.volgende { right: 16px; }

  /* ── legenda weekoverzicht ── */
  .legenda { display: flex; gap: 18px; margin-top: 18px; font-size: 13px; color: var(--ink2); }
  .legenda span { display: inline-flex; align-items: center; gap: 7px; }
  .legenda .vk { width: 12px; height: 12px; border-radius: 3px; }

  /* ── generieke states ── */
  .mid-kaart { background: var(--surface); border: 1px solid var(--rand-kaart); border-radius: 16px; box-shadow: var(--shadow); padding: 32px 24px; margin-top: 26px; text-align: center; }
  .mid-kaart .groot { font-size: 56px; margin-bottom: 14px; }
  .mid-kaart p { color: var(--ink2); margin-bottom: 16px; }
  .setup { background: var(--amber-bg); border: 1px solid var(--amber-rand); border-radius: 12px; padding: 16px 18px; font-size: 14px; color: var(--amber-label); line-height: 1.6; margin-top: 26px; text-align: left; }
  .setup code { background: rgba(0,0,0,.06); padding: 1px 5px; border-radius: 5px; }
  .leeg { color: var(--ink2); font-size: 15px; padding: 8px 0; }
  code { background: rgba(0,0,0,.05); padding: 1px 5px; border-radius: 5px; font-size: .9em; }
  .sync-info { font-size: 12px; color: var(--faint); margin-top: 12px; }

  footer { margin-top: 40px; font-size: 13px; color: var(--faint); }
  footer a { color: var(--ink2); }

  @media (max-width: 560px) {
    header h1 { font-size: 34px; }
  }
</style>
</head>
<body>
<div class="wrap" x-data="app()" x-init="init()" x-cloak>
  <header>
    <div class="eyebrow"><a href="../">Lukasvan3l</a> · Parro</div>
    <h1>Parro-overzicht</h1>
    <p class="intro">Wat er op school speelt — in één oogopslag: de agenda met wat je moet regelen, een weekoverzicht en de meldingen.</p>
  </header>

  <!-- setup nog niet gedaan -->
  <template x-if="setupNodig">
    <div class="setup">
      <strong>Nog even instellen.</strong> Vul in <code>config.js</code> je Supabase
      <code>supabaseUrl</code> en <code>supabaseAnonKey</code> in. Zie
      <code>supabase/README.md</code> voor de stappen.
    </div>
  </template>

  <!-- niet ingelogd -->
  <template x-if="!setupNodig && !session">
    <div class="mid-kaart">
      <div class="groot">🏫</div>
      <p>Log in om de Parro-agenda en berichten te zien.</p>
      <button class="knop-pill knop-brand" @click="login()">Inloggen met Google</button>
    </div>
  </template>

  <!-- ingelogd maar geen toegang -->
  <template x-if="!setupNodig && session && toegangGecheckt && !toegang">
    <div class="mid-kaart">
      <div class="groot">🔒</div>
      <p><strong>Geen toegang</strong><br>Dit account (<span x-text="session?.user?.email"></span>) staat niet op de gastenlijst.</p>
      <button class="knop-pill" @click="logout()">Uitloggen</button>
    </div>
  </template>

  <!-- ingelogd + toegang -->
  <template x-if="!setupNodig && session && toegang">
    <div>
      <div class="accountbalk">
        <span>Ingelogd als <span class="naam" x-text="naam"></span></span>
        <button class="knop-pill" @click="logout()">Uitloggen</button>
      </div>

      <nav class="tabs">
        <button :class="{actief: tab==='agenda'}" @click="tab='agenda'">
          <span>Agenda</span>
          <span class="badge" x-show="teRegelen>0" x-text="teRegelen"></span>
        </button>
        <button :class="{actief: tab==='week'}" @click="tab='week'">
          <span>Weekoverzicht</span>
        </button>
        <button :class="{actief: tab==='meldingen'}" @click="tab='meldingen'">
          <span>Meldingen</span>
          <span class="badge" x-show="belangrijkeMeldingen.length>0" x-text="belangrijkeMeldingen.length"></span>
        </button>
        <button :class="{actief: tab==='fotos'}" @click="tab='fotos'">
          <span>Foto's</span>
          <span class="badge" x-show="fotos.length>0" x-text="fotos.length"></span>
        </button>
      </nav>

      <!-- ══ AGENDA ══ -->
      <div class="paneel" x-show="tab==='agenda'">
        <div class="paneel-kop-rij">
          <h2 class="paneel-kop">Komende tijd</h2>
          <span class="te-regelen" x-show="teRegelen>0">
            <span class="swatch"></span>
            <span x-text="teRegelen + ' te regelen'"></span>
          </span>
        </div>

        <template x-for="k in kindVanDeWeek" :key="k.id">
          <div class="kvdw">
            <span class="ster">⭐</span>
            <span>Deze week is <strong x-text="k.kind || 'een van de kinderen'"></strong> kind van de week!</span>
          </div>
        </template>

        <template x-for="groep in agendaPerDag" :key="groep.datum">
          <div class="dag">
            <div class="dag-kop">
              <template x-if="isVandaag(groep.datum)"><span class="vandaag">Vandaag</span></template>
              <span x-text="dagKopLabel(groep.datum)"></span>
            </div>
            <template x-for="a in groep.items" :key="a.id">
              <div class="event-kaart">
                <div class="event-rij">
                  <div class="spine" :style="'background:' + (heeftOpenActie(a) ? 'var(--amber-spine)' : 'var(--brand)')"></div>
                  <div class="event-inhoud">
                    <div class="event-top">
                      <h3 x-text="a.titel"></h3>
                      <span class="spacer"></span>
                      <div class="kind-chips">
                        <template x-if="a.kind_van_de_week">
                          <span class="kind-chip">⭐ kind vd week</span>
                        </template>
                        <template x-if="a.kind">
                          <span class="kind-chip">
                            <span class="kind-dot" :style="'background:' + kindKleur(a.kind)"></span>
                            <span x-text="a.kind"></span>
                          </span>
                        </template>
                      </div>
                    </div>
                    <p class="event-oms" x-show="a.omschrijving" x-text="a.omschrijving"></p>
                    <div class="acties" x-show="a.parro_acties && a.parro_acties.length">
                      <template x-for="actie in a.parro_acties" :key="actie.id">
                        <label class="actie" :class="{af: actie.afgevinkt}">
                          <input type="checkbox" class="vink" :checked="actie.afgevinkt" @change="toggleActie(actie)">
                          <span class="label" x-text="actie.tekst"></span>
                          <span class="deadline" x-show="actie.uiterlijk" x-text="kortLabel(actie.uiterlijk)"></span>
                        </label>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <p class="leeg" x-show="agendaPerDag.length===0">Niets in de agenda voor de komende tijd. 🎉</p>
        <p class="sync-info" x-show="laatsteSync" x-text="'Laatste bericht uit Parro: ' + laatsteSync"></p>
      </div>

      <!-- ══ WEEKOVERZICHT ══ -->
      <div class="paneel" x-show="tab==='week'">
        <h2 class="paneel-kop">Weekoverzicht</h2>
        <p class="paneel-sub">Weeksamenvattingen — wat er speelde en wat eraan komt. De agent maakt deze elke week.</p>
        <template x-for="w in weken" :key="w.week_start">
          <div class="week">
            <div class="week-kop" x-text="weekLabel(w.week_start)"></div>
            <div class="week-kaart">
              <div class="md" x-html="md(w.samenvatting)"></div>
            </div>
          </div>
        </template>
        <p class="leeg" x-show="weken.length===0">Nog geen weekoverzichten — die maakt de agent elke zondagavond.</p>
      </div>

      <!-- ══ MELDINGEN ══ -->
      <div class="paneel" x-show="tab==='meldingen'">
        <h2 class="paneel-kop">Meldingen</h2>
        <p class="paneel-sub">Losse berichten uit Parro. Meerdere berichten over hetzelfde zijn in de Agenda tot één punt samengevoegd.</p>
        <div class="meldingen">
          <template x-for="m in meldingen" :key="m.id">
            <div class="melding" :class="{gelezen: !m.belangrijk}">
              <span class="dot"></span>
              <div class="melding-inhoud">
                <div class="melding-top">
                  <template x-if="m.groep">
                    <span class="afzender-pill groep">
                      <span class="kind-dot" :style="'background:' + kindKleur(m.groep)"></span>
                      <span x-text="m.groep"></span>
                    </span>
                  </template>
                  <template x-if="!m.groep">
                    <span class="afzender-pill algemeen" x-text="m.afzender || 'Algemeen'"></span>
                  </template>
                  <span class="spacer"></span>
                  <span class="tijd" x-text="tijdLabel(m.datum)"></span>
                </div>
                <h3 x-show="m.titel" x-text="m.titel"></h3>
                <div class="tekst" :class="{dicht: !open[m.id]}" @click="open[m.id]=!open[m.id]" x-text="m.tekst"></div>
              </div>
            </div>
          </template>
        </div>
        <p class="leeg" x-show="meldingen.length===0">Nog geen berichten — draai de agent (zie <code>agent/README.md</code>).</p>
      </div>

      <!-- ══ FOTO'S ══ -->
      <div class="paneel" x-show="tab==='fotos'">
        <h2 class="paneel-kop">Foto's</h2>
        <p class="paneel-sub">Foto's en video's uit de Parro-berichten.</p>
        <template x-for="groep in fotosPerDag" :key="groep.datum">
          <div class="dag">
            <div class="dag-kop"><span x-text="groep.datum ? dagKopLabel(groep.datum) : 'Zonder datum'"></span></div>
            <div class="foto-grid">
              <template x-for="f in groep.items" :key="f.id">
                <button class="foto-tegel" x-data="{ zicht: false }" x-intersect:enter.once.margin.300px="zicht = true" @click="lightbox = f" :title="f.parro_items?.titel || f.bestandsnaam">
                  <template x-if="f.isVideo">
                    <video :src="zicht ? f.url : null" muted preload="metadata"></video>
                  </template>
                  <template x-if="!f.isVideo">
                    <img :src="zicht ? f.url : null" loading="lazy" :alt="f.parro_items?.titel || 'foto'">
                  </template>
                  <span class="speel" x-show="f.isVideo">▶</span>
                </button>
              </template>
            </div>
          </div>
        </template>
        <p class="leeg" x-show="fotos.length===0">Nog geen foto's — die verschijnen zodra de agent Parro-bijlagen synct (zie <code>agent/README.md</code>).</p>
      </div>

      <!-- lightbox -->
      <template x-if="lightbox">
        <div class="lightbox" x-data="{ raakX: null }" @click="lightbox = null"
             @keydown.window.arrow-left="stap(-1)"
             @keydown.window.arrow-right="stap(1)"
             @keydown.window.escape="lightbox = null"
             @touchstart="raakX = $event.changedTouches[0].clientX"
             @touchend="if (raakX !== null) { const d = $event.changedTouches[0].clientX - raakX; if (Math.abs(d) > 50) stap(d < 0 ? 1 : -1); raakX = null; }">
          <button class="nav vorige" @click.stop="stap(-1)" x-show="fotos.findIndex(f => f.id === lightbox.id) > 0" aria-label="Vorige">‹</button>
          <div class="doos" @click.stop>
            <template x-if="lightbox.isVideo">
              <video :src="lightbox.url" controls autoplay></video>
            </template>
            <template x-if="!lightbox.isVideo">
              <img :src="lightbox.url" :alt="lightbox.parro_items?.titel || 'foto'">
            </template>
            <div class="balk">
              <a class="knop-pill knop-brand" :href="downloadUrl(lightbox)" :download="lightbox.bestandsnaam || 'foto'">Downloaden</a>
              <button class="knop-pill" @click="lightbox = null">Sluiten</button>
            </div>
          </div>
          <button class="nav volgende" @click.stop="stap(1)" x-show="fotos.findIndex(f => f.id === lightbox.id) < fotos.length - 1" aria-label="Volgende">›</button>
        </div>
      </template>
    </div>
  </template>

  <footer>
    Onderdeel van <a href="../">Lukas' plekkie</a> · data via een lokale Parro-agent + Supabase
  </footer>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const cfg = window.PARRO_CONFIG || {};
const sb = (cfg.supabaseUrl && cfg.supabaseAnonKey) ? createClient(cfg.supabaseUrl, cfg.supabaseAnonKey) : null;

function iso(d) { return d.toISOString().slice(0, 10); }
function maandagVan(d) {
  const m = new Date(d);
  m.setDate(m.getDate() - ((m.getDay() + 6) % 7));
  return m;
}

// mini-markdown → html (koppen, bullets, bold/italic), met html-escaping
function mdNaarHtml(src) {
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const inline = (s) => esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|\s)\*(\S[^*]*\S|\S)\*(?=\s|$|[.,!?])/g, "$1<em>$2</em>");
  const out = [];
  let lijst = false;
  for (const regel of (src || "").split("\n")) {
    const r = regel.trim();
    const li = r.match(/^[-*]\s+(.*)/);
    if (li) {
      if (!lijst) { out.push("<ul>"); lijst = true; }
      out.push(`<li>${inline(li[1])}</li>`);
      continue;
    }
    if (lijst) { out.push("</ul>"); lijst = false; }
    const kop = r.match(/^(#{1,3})\s+(.*)/);
    if (kop) out.push(`<h${kop[1].length + 1}>${inline(kop[2])}</h${kop[1].length + 1}>`);
    else if (r) out.push(`<p>${inline(r)}</p>`);
  }
  if (lijst) out.push("</ul>");
  return out.join("\n");
}

document.addEventListener("alpine:init", () => {
  Alpine.data("app", () => ({
    setupNodig: !sb, session: null, toegang: false, toegangGecheckt: false,
    tab: "agenda",
    agenda: [],      // parro_agenda incl. geneste parro_acties
    weken: [],       // parro_weekoverzicht
    items: [],       // parro_items (zonder raw)
    fotos: [],       // parro_fotos incl. signed url + item-info
    lightbox: null,  // geopende foto/video
    open: {},        // uitgeklapte meldingen
    _channel: null,
    _zetSessieLopend: null,

    async init() {
      if (!sb) return;
      const { data } = await sb.auth.getSession();
      await this.zetSessie(data.session);
      sb.auth.onAuthStateChange((_e, s) => { void this.zetSessie(s); });
    },

    async zetSessie(session) {
      const run = () => this._zetSessieWerk(session);
      this._zetSessieLopend = (this._zetSessieLopend || Promise.resolve()).then(run);
      await this._zetSessieLopend;
    },

    async _zetSessieWerk(session) {
      this.session = session;
      if (!session) {
        this.toegang = false;
        this.toegangGecheckt = false;
        this.stopAbonnement();
        return;
      }
      await sb.rpc("ensure_member");
      const { data } = await sb.from("members").select("user_id").maybeSingle();
      this.toegang = !!data;
      this.toegangGecheckt = true;
      if (this.toegang) { await this.laadAlles(); this.abonneer(); }
    },

    get naam() { return this.session?.user?.user_metadata?.full_name || this.session?.user?.email || "?"; },

    async login() {
      const redirectTo = location.href.split("#")[0];
      await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo } });
    },
    async logout() { await sb.auth.signOut(); location.reload(); },

    async laadAlles() {
      const maandag = iso(maandagVan(new Date()));
      const [ag, wk, it] = await Promise.all([
        sb.from("parro_agenda").select("*, parro_acties(*)").gte("datum", maandag).order("datum"),
        sb.from("parro_weekoverzicht").select("*").order("week_start", { ascending: false }).limit(12),
        sb.from("parro_items").select("id, soort, titel, tekst, groep, afzender, datum, belangrijk").order("datum", { ascending: false }).limit(60),
      ]);
      this.agenda = ag.data || [];
      this.weken = wk.data || [];
      this.items = it.data || [];
      await this.laadFotos();
    },

    async laadFotos() {
      const { data } = await sb
        .from("parro_fotos")
        .select("*, parro_items(titel, groep, afzender)")
        .order("datum", { ascending: false })
        .limit(300);
      const rijen = data || [];
      // Private bucket: per bestand een tijdelijke signed URL maken (mag alleen
      // als je lid bent, zie de storage-policy). In batch voor snelheid.
      const urls = {};
      if (rijen.length) {
        const { data: signed } = await sb.storage
          .from("parro-fotos")
          .createSignedUrls(rijen.map((r) => r.pad), 3600);
        for (const s of signed || []) if (s.signedUrl && !s.error) urls[s.path] = s.signedUrl;
      }
      this.fotos = rijen.map((r) => ({
        ...r,
        url: urls[r.pad] || null,
        isVideo: (r.content_type || "").startsWith("video") || r.soort === "VIDEO",
      })).filter((r) => r.url);
    },

    abonneer() {
      if (this._channel) return;
      this._channel = sb.channel("parro")
        .on("postgres_changes", { event: "*", schema: "public", table: "parro_acties" }, () => this.laadAlles())
        .on("postgres_changes", { event: "*", schema: "public", table: "parro_agenda" }, () => this.laadAlles())
        .on("postgres_changes", { event: "*", schema: "public", table: "parro_fotos" }, () => this.laadFotos())
        .subscribe();
    },
    stopAbonnement() {
      if (!this._channel) return;
      sb.removeChannel(this._channel);
      this._channel = null;
    },

    /* ── afgeleide data ── */
    get kindVanDeWeek() {
      const ma = maandagVan(new Date());
      const zo = new Date(ma); zo.setDate(zo.getDate() + 6);
      return this.agenda.filter((a) =>
        a.kind_van_de_week && a.datum <= iso(zo) && (a.eind_datum || a.datum) >= iso(ma));
    },
    get agendaKomend() {
      const vandaag = iso(new Date());
      return this.agenda.filter((a) => (a.eind_datum || a.datum) >= vandaag);
    },
    get agendaPerDag() {
      const per = new Map();
      for (const a of this.agendaKomend) {
        if (!per.has(a.datum)) per.set(a.datum, []);
        per.get(a.datum).push(a);
      }
      return [...per.entries()]
        .sort((x, y) => x[0].localeCompare(y[0]))
        .map(([datum, items]) => ({ datum, items }));
    },
    heeftOpenActie(a) {
      return (a.parro_acties || []).some((x) => !x.afgevinkt);
    },
    // Agenda-badge: aantal komende events met nog iets te regelen.
    get teRegelen() {
      return this.agendaKomend.filter((a) => this.heeftOpenActie(a)).length;
    },
    get belangrijkeMeldingen() { return this.items.filter((m) => m.belangrijk); },
    get meldingen() { return this.items.filter((m) => m.tekst || m.titel); },
    get fotosPerDag() {
      const per = new Map();
      for (const f of this.fotos) {
        const dag = f.datum ? iso(new Date(f.datum)) : "";
        if (!per.has(dag)) per.set(dag, []);
        per.get(dag).push(f);
      }
      return [...per.entries()]
        .sort((x, y) => y[0].localeCompare(x[0]))
        .map(([datum, items]) => ({ datum, items }));
    },
    get laatsteSync() {
      const t = this.items[0]?.datum;
      return t ? new Date(t).toLocaleString("nl-NL", { dateStyle: "medium", timeStyle: "short" }) : "";
    },

    /* ── acties afvinken ── */
    async toggleActie(actie) {
      await sb.from("parro_acties")
        .update({ afgevinkt: !actie.afgevinkt, afgevinkt_door: this.naam })
        .eq("id", actie.id);
      await this.laadAlles();
    },

    /* ── foto's ── */
    downloadUrl(f) {
      if (!f?.url) return "#";
      // '&download=<naam>' laat Supabase Storage het bestand als download serveren.
      return f.url + "&download=" + encodeURIComponent(f.bestandsnaam || "foto");
    },
    // Navigeren in de lightbox: fotos staat in dezelfde volgorde als de galerij.
    stap(richting) {
      if (!this.lightbox) return;
      const i = this.fotos.findIndex((f) => f.id === this.lightbox.id);
      if (i === -1) return;
      const j = i + richting;
      if (j >= 0 && j < this.fotos.length) this.lightbox = this.fotos[j];
    },

    /* ── weergave ── */
    md: mdNaarHtml,
    // Kleur van het kind-bolletje, afgeleid van de naam (geen namen hardgecodeerd).
    kindKleur(naam) {
      const palet = ["#2E7D8A", "#C25D4B", "#7A4E8C", "#C6741F", "#2F6E43", "#B9791F"];
      let h = 0;
      for (const ch of (naam || "")) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      return palet[h % palet.length];
    },
    isVandaag(d) { return d === iso(new Date()); },
    dagKopLabel(d) {
      const dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long" }).toUpperCase();
    },
    dagLabel(d) {
      const dt = new Date(d + "T00:00:00");
      const vandaag = new Date(); vandaag.setHours(0, 0, 0, 0);
      const diff = Math.round((dt - vandaag) / 86400000);
      const naam = dt.toLocaleDateString("nl-NL", { weekday: "long", day: "numeric", month: "long" });
      if (diff === 0) return "Vandaag · " + naam;
      if (diff === 1) return "Morgen · " + naam;
      return naam;
    },
    kortLabel(d) {
      if (!d) return "";
      return new Date(d).toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
    },
    // Tijdstempel voor meldingen: 'vandaag 08:12' / 'gisteren 16:40' / '7 jul'.
    tijdLabel(d) {
      if (!d) return "";
      const dt = new Date(d);
      const dag0 = (x) => { const y = new Date(x); y.setHours(0, 0, 0, 0); return y; };
      const diff = Math.round((dag0(new Date()) - dag0(dt)) / 86400000);
      const tijd = dt.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
      if (diff === 0) return "vandaag " + tijd;
      if (diff === 1) return "gisteren " + tijd;
      return dt.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
    },
    weekLabel(weekStart) {
      const ma = new Date(weekStart + "T00:00:00");
      const zo = new Date(ma); zo.setDate(zo.getDate() + 6);
      const f = (x) => x.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
      return `Week van ${f(ma)} t/m ${f(zo)}`;
    },
  }));
});
</script>
<script src="config.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.14.1/dist/cdn.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
